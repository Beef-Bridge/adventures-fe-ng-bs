<h1>Welcome to {{ title }}!</h1>

<h2>Liste des randonnées</h2>

<input #input (keyup.enter)="selectHike(input.value)" type="number" />
<p *ngIf="hikeSelected">On a sélectionné la rando : {{ hikeSelected.title }}</p>
<p *ngIf="!hikeSelected">Aucune rando n'a été trouvée.</p>

<p *ngFor="let hike of hikeList">
  {{ hike.title }}
</p>
